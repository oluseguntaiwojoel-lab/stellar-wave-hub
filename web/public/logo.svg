<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Nova to Plasma gradient (primary brand) -->
    <linearGradient id="grad-nova-plasma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Solar to Nova gradient -->
    <linearGradient id="grad-solar-nova" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Plasma glow -->
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Star glow filter -->
    <filter id="star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Wave glow filter -->
    <filter id="wave-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="230" r="180" fill="url(#glow-center)"/>

  <!-- Outer orbital ring -->
  <ellipse cx="256" cy="240" rx="155" ry="55" stroke="url(#grad-nova-plasma)" stroke-width="2" stroke-opacity="0.25" fill="none" transform="rotate(-15, 256, 240)"/>
  <ellipse cx="256" cy="240" rx="155" ry="55" stroke="url(#grad-nova-plasma)" stroke-width="2" stroke-opacity="0.2" fill="none" transform="rotate(25, 256, 240)"/>

  <!-- Central star (hexagonal starburst) -->
  <g filter="url(#star-glow)" transform="translate(256, 220)">
    <!-- Main 6-point star -->
    <polygon points="0,-72 18,-24 66,-36 36,6 66,48 18,42 0,90 -18,42 -66,48 -36,6 -66,-36 -18,-24" fill="url(#grad-nova-plasma)" opacity="0.9"/>
    <!-- Inner bright core -->
    <circle cx="0" cy="8" r="28" fill="#a78bfa" opacity="0.6"/>
    <circle cx="0" cy="8" r="16" fill="#f0eef6" opacity="0.85"/>
    <circle cx="0" cy="8" r="8" fill="white"/>
  </g>

  <!-- Wave lines flowing beneath the star -->
  <g filter="url(#wave-glow)">
    <!-- Wave 1 — top, wider -->
    <path d="M80,290 Q140,260 190,280 Q240,300 256,280 Q272,260 320,280 Q370,300 432,270" stroke="#06b6d4" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- Wave 2 — middle -->
    <path d="M95,310 Q150,285 200,305 Q245,322 256,305 Q267,285 310,305 Q360,325 420,295" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Wave 3 — bottom -->
    <path d="M110,330 Q160,310 205,325 Q245,340 256,325 Q267,310 310,325 Q355,340 405,315" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Small accent stars / particles -->
  <circle cx="130" cy="170" r="3" fill="#fbbf24" opacity="0.8" filter="url(#star-glow)"/>
  <circle cx="370" cy="155" r="2.5" fill="#22d3ee" opacity="0.7" filter="url(#star-glow)"/>
  <circle cx="105" cy="250" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="400" cy="235" r="2" fill="#34d399" opacity="0.6"/>
  <circle cx="340" cy="175" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="175" cy="195" r="1.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Text: STELLAR WAVE HUB -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="42" letter-spacing="6" fill="url(#grad-nova-plasma)">STELLAR WAVE</text>
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="28" letter-spacing="12" fill="#a78bfa" opacity="0.7">HUB</text>
</svg>
